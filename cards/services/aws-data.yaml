# AWS Data Services

## S3 Bucket
```yaml
id: aws-s3
name: S3 Bucket
type: service
domain: [data]
cost: 1
rarity: common
stats:
  attack: 0
  health: 4
keywords: []
effect: |
  Storage: You may "store" up to 2 cards from your hand
  face-down under this service.
  If destroyed, return stored cards to hand.
