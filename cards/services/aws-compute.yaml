# AWS Compute Services

## EC2 Instance
```yaml
id: aws-ec2-instance
name: EC2 Instance
type: service
domain: [compute]
cost: 2
rarity: common
stats:
  attack: 2
  health: 3
keywords: [scaling]
effect: |
  Scaling: Pay 🖥️ to give this service +1/+1.
  Can scale up to 3 times.
flavor: "The backbone of cloud computing since 2006"
reference: "https://aws.amazon.com/ec2/"
```

## Lambda Function
```yaml
id: aws-lambda
name: Lambda Function
type: service
domain: [compute]
cost: 1
rarity: common
stats:
  attack: 1
  health: 1
keywords: [serverless]
effect: |
  Serverless: Can attack immediately.
  When this attacks, deal +2 damage.
  Destroy this at end of turn.
flavor: "No servers to manage, pay only for what you use"
reference: "https://aws.amazon.com/lambda/"
```

