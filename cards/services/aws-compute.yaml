## Auto Scaling Group
```yaml
id: aws-asg
name: Auto Scaling Group
type: architecture
domain: [compute, compute, network]
cost: 4
rarity: rare
effect: |
  When a Compute service you control is destroyed,
  deploy a copy of it at the start of your next turn.
  (Max 1 copy per turn)
flavor: "Scale out, not up"
reference: "https://aws.amazon.com/autoscaling/"
```
